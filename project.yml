name: Abstrum
options:
  bundleIdPrefix: fi.absum.abstrum
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
  xcodeVersion: "26.0"
settings:
  base:
    # Absum Corporation Oy
    ORGANIZATIONNAME: Absum Corporation Oy
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2" # 1 = iPhone, 2 = iPad (universal)
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    CLANG_CXX_LIBRARY: "libc++"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  Abstrum:
    type: application
    platform: iOS
    sources:
      - path: Abstrum
      - path: DSP
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fi.absum.abstrum
        PRODUCT_NAME: Abstrum
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Abstrum/Abstrum-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/DSP/include
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    info:
      path: Abstrum/Info.plist
      properties:
        CFBundleDisplayName: Abstrum
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSMicrophoneUsageDescription: "Abstrum listens through your microphone to hear the notes and chords you play, so it can give you instant feedback as you practice."
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        # Portrait-only — the UI is designed for portrait.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Rajdhani-Light.ttf
          - Rajdhani-Regular.ttf
          - Rajdhani-Medium.ttf
          - Rajdhani-SemiBold.ttf
          - Rajdhani-Bold.ttf
  AbstrumTests:
    type: bundle.unit-test
    platform: iOS
    # Logic tests (no TEST_HOST): compile the portable C++ core directly so we
    # can exercise the pitch detector in isolation against synthetic signals.
    sources:
      - path: Tests
      - path: DSP
      - path: Abstrum/Core/NoteMath.swift
      - path: Abstrum/Core/GuitarTuning.swift
      - path: Abstrum/Learn/Lesson.swift
      - path: Abstrum/Learn/ProgressStore.swift
      - path: Abstrum/Learn/AdaptiveTempo.swift
      - path: Abstrum/Learn/Scaffold.swift
      - path: Abstrum/Learn/DailySession.swift
      - path: Abstrum/Learn/InterleavedDrill.swift
      - path: Abstrum/Learn/ReminderScheduler.swift
      - path: Abstrum/Chords/Chord.swift
      - path: Abstrum/Chords/ChordVariants.swift
      - path: Abstrum/Chords/ChordProgression.swift
      - path: Abstrum/Songs/Song.swift
      - path: Abstrum/Highway/TabImport.swift
      - path: Abstrum/Audio/ToneSynth.swift
      - path: Abstrum/Audio/AudioSettings.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_OBJC_BRIDGING_HEADER: Tests/AbstrumTests-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/DSP/include
schemes:
  Abstrum:
    build:
      targets:
        Abstrum: all
    test:
      targets:
        - AbstrumTests
      gatherCoverageData: false
